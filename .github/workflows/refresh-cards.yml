name: Refresh card data

on:
  schedule:
    - cron: "0 */6 * * *"     # every 6 hours (UTC)
  workflow_dispatch:           # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: refresh-card-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fetch the published sheet CSV
        run: |
          curl -sSL --fail --retry 3 --retry-delay 5 \
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vRreFF_EpmF9ob87yompgZkBor29HfUKJCdn02eZIX7G8NuV8DpBWXKx4JOqNNzo5JDmz-KIkRGdV2N/pub?gid=0&single=true&output=csv" \
            -o cards.csv

      - name: Build cards.json
        run: python3 build_cards.py

      - name: Commit if the data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cards.json
          if git diff --cached --quiet; then
            echo "No change — nothing to commit."
          else
            git commit -m "Auto-refresh card data [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            git push
          fi
